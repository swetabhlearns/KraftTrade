[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run db:generate && npm run build -w @kraftbase/shared && npm run build -w @kraftbase/api"
[deploy]
startCommand = "npm run db:deploy -w @kraftbase/api && npm run start -w @kraftbase/api"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
