name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
